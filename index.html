<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>MUNIR</title>
  <meta
    name="description"
    content="MUNIR is a calm Islamic companion for Quran, daily remembrance, prayer and memorisation."
  />

  <style>
    :root {
      --emerald: #073b2d;
      --emerald-light: #145f49;
      --ivory: #f7f3e8;
      --gold: #b88b32;
      --charcoal: #252a28;
      --stone: #ddd6c7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--charcoal);
      background:
        radial-gradient(circle at top right, #e6f0ec 0, transparent 35%),
        var(--ivory);
    }

    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 20px;
    }

    .card {
      width: min(720px, 100%);
      padding: 56px 36px;
      text-align: center;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid var(--stone);
      border-radius: 32px;
      box-shadow: 0 20px 60px rgba(7, 59, 45, 0.12);
    }

    .mark {
      width: 96px;
      height: 96px;
      margin: 0 auto 24px;
      display: grid;
      place-items: center;
      color: var(--ivory);
      background: var(--emerald);
      border: 2px solid var(--gold);
      border-radius: 26px;
      font-size: 54px;
      font-weight: 800;
    }

    h1 {
      margin: 0;
      color: var(--emerald);
      font-size: clamp(44px, 10vw, 72px);
      letter-spacing: 0.08em;
    }

    .tagline {
      margin: 18px auto 0;
      max-width: 560px;
      font-size: 21px;
      line-height: 1.6;
    }

    .coming-soon {
      display: inline-block;
      margin-top: 28px;
      padding: 12px 22px;
      color: var(--gold);
      border: 1px solid var(--gold);
      border-radius: 999px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    nav {
      margin-top: 34px;
    }

    nav a {
      margin: 0 10px;
      color: var(--emerald-light);
      font-weight: 700;
      text-decoration: none;
    }

    nav a:hover {
      text-decoration: underline;
    }

    footer {
      margin-top: 36px;
      color: #66706c;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <main>
    <section class="card">
      <div class="mark">M</div>

      <h1>MUNIR</h1>

      <p class="tagline">
        A calm Islamic companion for Quran, daily remembrance,
        prayer and memorisation.
      </p>

      <div class="coming-soon">Launching soon</div>

      <nav>
        <a href="privacy.html">Privacy Policy</a>
        <a href="mailto:support@getmunir.com">Support</a>
      </nav>

      <footer>
        © 2026 MUNIR. All rights reserved.
      </footer>
    </section>
  </main>
</body>
</html>
